  <script>
    // Default to dark (Tokyo Night) before first paint; mode-watcher then agrees.
    try {
      if (!localStorage.getItem("mode-watcher-mode")) localStorage.setItem("mode-watcher-mode", "dark");
      if (localStorage.getItem("mode-watcher-mode") !== "light") document.documentElement.classList.add("dark");
    } catch (e) { document.documentElement.classList.add("dark"); }
    // Kick off the task fetch immediately — in parallel with the JS bundle
    // download+eval. It usually resolves before the app mounts, so we also stash
    // the resolved payload synchronously (__bootData) to render with data on the
    // FIRST paint (no empty-then-populated flicker).
    window.__bootTasks = fetch("/api/issues?view=tree")
      .then((r) => (r.ok ? r.json() : null))
      .then((d) => ((window.__bootData = d), d))
      .catch(() => null);
  </script>
